    packages:
      brew:
        install: ~

  - name: heroic-games-launcher
    description: Native GOG and Epic Games launcher for Linux
    category: [desktop]
    packages:
      pacman:
        install: ~
      yay:
        install: heroic-games-launcher-bin
      apt:
        pre:
          - HEROIC_VERSION=$(curl -s https://api.github.com/repos/Heroic-Games-Launcher/HeroicGamesLauncher/releases/latest | grep -oP '(?<="tag_name":\ "v)[^"]*')
